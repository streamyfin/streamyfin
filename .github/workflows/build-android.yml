name: 🤖 Android APK Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    name: 🏗️ Build Android APK
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4.2.2

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2.0.2
        with:
          bun-version: 1.2.13

      - name: ☕️ Setup JDK
        uses: actions/setup-java@v4.7.1
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📦 Install dependencies
        run: bun install

      - name: 🏗️ Build APK via Bun
        run: bun run build:android:local

      - name: ☁️ Upload APK artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: streamyfin-android-preview
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: 💬 Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const artifactUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "📲 **APK Preview Available**\n\nDownload: [app-release.apk](" + artifactUrl + ")"
            });
