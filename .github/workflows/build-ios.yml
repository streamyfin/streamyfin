name: Automatic Build and Deploy

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
#  push:
#    branches: [develop]

jobs:
  build:
    runs-on: macos-15
    name: Build IOS
    steps:

      - name: 📥 Check out repository
        uses: actions/checkout@v4.2.2

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2.0.2
        with:
          # @todo: update to 1.x once this is fixed: https://github.com/streamyfin/streamyfin/pull/690#discussion_r2089749689  
          bun-version: 1.2.13

      - name: 📦 Install & Prepare
        run: |
          bun i && bun run submodule-reload
          npx expo prebuild

      - name: 🏗️ Build iOS app
        uses: sparkfabrik/ios-build-action@v2.3.2
        with:
          upload-to-testflight: false
          increment-build-number: false
          build-pods: true
          pods-path: "ios/Podfile"
          configuration: Release
          # Change later to app-store if wanted
          export-method: appstore
          #export-method: ad-hoc
          workspace-path: "ios/Streamyfin.xcodeproj/project.xcworkspace/"
          project-path: "ios/Streamyfin.xcodeproj"
          scheme: Streamyfin
          apple-key-id: ${{ secrets.APPLE_KEY_ID }}
          apple-key-issuer-id: ${{ secrets.APPLE_KEY_ISSUER_ID }}
          apple-key-content: ${{ secrets.APPLE_KEY_CONTENT }}
          team-id: ${{ secrets.TEAM_ID }}
          team-name: ${{ secrets.TEAM_NAME }}
          #match-password: ${{ secrets.MATCH_PASSWORD }}
          #match-git-url: ${{ secrets.MATCH_GIT_URL }}
          #match-git-basic-authorization: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          #match-build-type: "appstore"
          #browserstack-upload: true
          #browserstack-username: ${{ secrets.BROWSERSTACK_USERNAME }}
          #browserstack-access-key: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          #fastlane-env: stage
          ios-app-id: com.stetsed.teststreamyfin
          output-path: build-${{ github.sha }}.ipa
      # This need to be studied since i didn't make it work
      - name: 💬 Notify PR
        uses: actions/github-script@v7.0.1
        continue-on-error: true
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });

            const downloadLinks = artifacts.data.artifacts.map(art => 
              `[${art.name}](${github.context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${art.id})`
            ).join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📲 **iOS Build Available**\n\nDownload: ${downloadLinks}`
            })
      
      - name: 📤 Upload IPA artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: streamyfin-ipa-${{ github.sha }}
          path: build-${{ github.sha }}.ipa
          retention-days: 30
