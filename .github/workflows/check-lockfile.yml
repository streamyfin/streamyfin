name: 🔒 Lockfile Consistency Check

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [develop, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-lockfile:
    name: 🔍 Verify Lockfile Consistency
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4.1.3
        with:
          fetch-depth: 0

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2.0.2
        with:
          bun-version: '1.2.13'

      - name: 💾 Cache Bun dependencies
        uses: actions/cache@v4.0.2
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: 🛡️ Verify lockfile consistency
        run: |
          set -euxo pipefail
          echo "➡️ Checking for discrepancies between bun.lockb and package.json..."
          
          # Clean install to ensure fresh node_modules
          bun install --frozen-lockfile --ignore-scripts
          
          # Verify lockfile matches package.json
          if ! bun install --dry-run --frozen-lockfile --ignore-scripts; then
            echo "❌ Error: Lockfile is out of sync with package.json!"
            echo "Run 'bun install' locally and commit the updated lockfile"
            exit 1
          fi
          
          echo "✅ Lockfile is consistent with package.json!"
